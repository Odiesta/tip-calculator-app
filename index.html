<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style/main.css" />

    <title>Frontend Mentor | Tip calculator app</title>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <img src="images/logo.svg" alt="Logo" class="logo__img" />
      </div>

      <div class="calculator">
        <div class="calculator__bill-container">
          <input-number
            text="Bill"
            idInput="billInput"
            idError="billError"
            image="dollar"
          ></input-number>
          <div class="tip__container">
            <p class="tip__text">Select Tip %</p>
            <div class="tip__options">
              <button-custom text="5%"></button-custom>
              <button-custom text="10%"></button-custom>
              <button-custom text="15%" class="active"></button-custom>
              <button-custom text="25%"></button-custom>
              <button-custom text="50%"></button-custom>
              <button-custom
                text="Custom"
                class="button--custom"
              ></button-custom>
              <tip-input
                text="Number of tip"
                idGroup="tip__group"
                idInput="tip__input"
                idError="tip__error"
              ></tip-input>
            </div>
          </div>
          <input-number
            text="Number of People"
            idInput="peopleInput"
            idError="peopleError"
            image="person"
          ></input-number>
        </div>
        <div class="calculator__result-container">
          <div class="result__wrapper">
            <result-text
              title="Tip Amount"
              text="/ person"
              value="4.27"
              id="tipPerPerson"
            ></result-text>
            <result-text
              title="Total"
              text="/ person"
              value="32.79"
              id="totalPerPerson"
            ></result-text>
          </div>
          <div class="result__button-container">
            <button-custom
              text="Reset"
              class="button--result"
              id="reset-button"
            ></button-custom>
          </div>
        </div>
      </div>
    </div>

    <!-- <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer> -->

    <script src="components/Button.js"></script>
    <script src="components/InputNumber.js"></script>
    <script src="components/TipInput.js"></script>
    <script src="components/ResultText.js"></script>
    <script src="script.js"></script>
  </body>
</html>
