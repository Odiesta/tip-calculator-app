<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style/main.css" />

    <title>Frontend Mentor | Tip calculator app</title>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <img src="images/logo.svg" alt="Logo" class="logo__img" />
      </div>

      <div class="calculator">
        <div class="calculator__bill-container">
          <div class="bill__group">
            <label for="bill" class="bill__label">Bill</label>
            <div class="bill__group-input">
              <img
                src="images/icon-dollar.svg"
                alt="Icon dollar"
                class="bill__input-symbol"
              />
              <input
                type="number"
                name="bill"
                class="bill__input"
                placeholder="0"
                id="bill__input"
              />
            </div>
          </div>
          <div class="tip__container">
            <p class="tip__text">Select Tip %</p>
            <div class="tip__options">
              <button class="tip__button">5%</button>
              <button class="tip__button">10%</button>
              <button class="tip__button tip__button--active">15%</button>
              <button class="tip__button">25%</button>
              <button class="tip__button">50%</button>
              <button class="tip__button tip__button--custom">Custom</button>
              <div class="tip__group tip__group--hidden" id="tip__group">
                <label for="tip__input" class="tip__label">Number of tip</label>
                <div class="tip__group-input">
                  <input
                    type="number"
                    name="tip"
                    class="tip__input"
                    placeholder="0"
                    id="tip__input"
                  />
                  <span class="tip__input-percent">%</span>
                </div>
              </div>
            </div>
          </div>
          <div class="people__group">
            <label for="people" class="people__label">Number of People</label>
            <div class="people__group-input">
              <img
                src="images/icon-person.svg"
                alt="Icon person"
                class="people__input-symbol"
              />
              <input
                type="number"
                name="people"
                class="people__input"
                placeholder="0"
                id="people__input"
              />
            </div>
          </div>
        </div>
        <div class="calculator__result-container">
          <div class="result__wrapper">
            <div class="result__text-wrapper">
              <p class="result__text">
                Tip Amount <span class="result__text--sub">/ person</span>
              </p>
              <p class="result__value" id="tipPerPerson">$4.27</p>
            </div>
            <div class="result__text-wrapper">
              <p class="result__text">
                Total <span class="result__text--sub">/ person</span>
              </p>
              <p class="result__value" id="totalPerPerson">$32.79</p>
            </div>
          </div>
          <div class="result__button-container">
            <button class="result__button" id="reset__button">Reset</button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
